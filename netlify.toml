[build]
command = "bash ./netlify.sh"
publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# `netlify.sh` builds with `VITE_SURREALIST_COMPRESS=false` so the `.wasm` files
# shipped to Netlify are the raw WebAssembly bytes (magic `\0asm`). Set the
# correct MIME explicitly so `WebAssembly.instantiateStreaming` never trips the
# slow `Content-Type !== "application/wasm"` fallback and to guard against any
# proxy that would otherwise default to `application/octet-stream`.
[[headers]]
  for = "/assets/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"